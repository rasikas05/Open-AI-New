spring.datasource.url=jdbc:mysql://localhost:3306/DB?createDatabaseIfNotExists=true
spring.datasource.username=root
spring.datasource.password=root

# Hibernate Configuration
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# OpenAI configuration
# Prefer using an environment variable for the API key in real environments.
openai.api.key=${OPENAI_API_KEY}
# Do not put quotes around the key - Spring would include them and OpenAI returns 401
openai.api.model=gpt-4o
openai.api.url=https://api.openai.com/v1/chat/completions

presidio.analyzer.url=http://localhost:5001/analyze
presidio.anonymizer.url=http://localhost:5002/anonymize

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html


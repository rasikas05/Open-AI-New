spring.datasource.url=jdbc:mysql://localhost:3306/openaichatprocess?createDatabaseIfNotExists=true
spring.datasource.username=root
spring.datasource.password=root

# Hibernate Configuration
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# DB is now used for chat session/message persistence.
# Keep MySQL running before app startup.

# Run on a non-default port to avoid conflicts.
server.port=8081

# OpenAI configuration
# Prefer using an environment variable for the API key in real environments.
# Default to empty so the app can start without a key (endpoints that call OpenAI will fail until set).
openai.api.key=${OPENAI_API_KEY}
# Do not put quotes around the key - Spring would include them and OpenAI returns 401
openai.api.model=gpt-4.1
openai.api.url=https://api.openai.com/v1/chat/completions
openai.assistant.system-prompt.enabled=true
openai.assistant.system-prompt=You are an Infor M3 assistant. Answer only questions related to Infor M3 ERP, its modules, processes, transactions, integrations, and troubleshooting. If the user asks anything outside Infor M3, do not answer that topic. Politely say you can only help with Infor M3 and ask for an M3-related question. If context is insufficient, ask a clarifying question. Do not invent facts. Prefer grounded answers from provided knowledge context. If you got any place holder then dont show directly in the result data.
openai.input.remove-anonymization-placeholders=true
openai.response.include-sanitization-debug=true

presidio.enabled=true
presidio.api.key=secret123
presidio.api.key.header=x-api-key
presidio.analyzer.url=http://localhost:8000/api/v1/analyze
presidio.anonymizer.url=http://localhost:8000/api/v1/anonymize
chat.session.default-token-limit=200000
chat.history.load-from-db=true
chat.history.max-exchanges=10
chat.history.allow-client-history=true
tenant.quota.default-base-limit=200000
tenant.quota.monthly-reset.cron=0 0 0 1 * *
tenant.quota.max-topup-tokens=500000
tenant.quota.timezone=UTC
suggestion.rule.enabled=true
suggestion.llm.enabled=true
suggestion.min-count=3
suggestion.max-count=5
suggestion.cache.ttl-seconds=900
suggestion.cache.max-entries=1000

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html


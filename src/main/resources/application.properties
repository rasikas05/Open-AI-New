spring.datasource.url=jdbc:mysql://localhost:3306/openaichatprocessdb?createDatabaseIfNotExists=true
spring.datasource.username=root
spring.datasource.password=root

# Hibernate Configuration
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# DB is now used for chat session/message persistence.
# Keep MySQL running before app startup.

# Run on a non-default port to avoid conflicts.
server.port=8081

# OpenAI configuration
# Prefer using an environment variable for the API key in real environments.
# Default to empty so the app can start without a key (endpoints that call OpenAI will fail until set).
openai.api.key=${OPENAI_API_KEY}
# Do not put quotes around the key - Spring would include them and OpenAI returns 401
openai.api.model=gpt-4.1
openai.api.url=https://api.openai.com/v1/chat/completions
openai.api.timeout-ms=120000
openai.assistant.system-prompt.enabled=true
openai.assistant.system-prompt=You are an Infor M3 consultant assistant covering Finance, Manufacturing, and localization. Answer only questions related to Infor M3 ERP, its modules, processes, transactions, integrations, and troubleshooting. If the user asks anything outside Infor M3, politely say you can only help with Infor M3 and ask for an M3-related question. This answer path does NOT use retrieved documentation — rely on general Infor M3 knowledge only. Begin with a brief note that the answer is based on general M3 knowledge, not the documentation search results. Do not invent facts; ask clarifying questions when needed. If you see anonymization placeholders, do not show them directly in the result.
openai.input.remove-anonymization-placeholders=true
openai.response.include-sanitization-debug=true

# Python RAG API Configuration
# Set to false to disable the Python RAG API and use OpenAI directly
python-rag.api.enabled=true
# Base URL of the Python RAG FastAPI service
python-rag.api.base-url=http://localhost:8083
# Endpoint path for the query operation
python-rag.api.endpoint=/chat
python-rag.api.retrieval-endpoint=/retrieval
python-rag.api.route-endpoint=/route
# HTTP request timeout in milliseconds (retrieval can take 15-30s with embeddings)
python-rag.api.timeout-ms=180000
# Query rewrite: false = rewrite OFF (maps to skip_rewrite=true on Python /retrieval)
rag.query-rewrite.enabled=true
# Default parameters for RAG queries
python-rag.api.top-k=5
python-rag.api.final-limit=8
rag.accept-threshold=0.30
rag.prompt-threshold=0.45
rag.fallback-on-no-answer=true

presidio.enabled=true
presidio.api.key=secret123
presidio.api.key.header=x-api-key
presidio.analyzer.url=http://localhost:8000/api/v1/analyze
presidio.anonymizer.url=http://localhost:8000/api/v1/anonymize
presidio.api.timeout-ms=15000

# Comprehend anonymization configuration
# Enable/disable Comprehend-based PII detection and anonymization
comprehend.anonymization.enabled=true
# AWS Region for Comprehend service (e.g., ap-south-1, us-east-1)
aws.region=ap-south-1
chat.session.default-token-limit=200000
chat.history.load-from-db=true
chat.history.max-exchanges=10
chat.history.allow-client-history=true
tenant.quota.default-base-limit=200000
tenant.quota.monthly-reset.cron=0 0 0 1 * *
tenant.quota.max-topup-tokens=500000
tenant.quota.timezone=UTC
suggestion.rule.enabled=true
suggestion.llm.enabled=true
suggestion.min-count=3
suggestion.max-count=5
suggestion.cache.ttl-seconds=900
suggestion.cache.max-entries=1000

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

